name: CPO Container Sync

on:
  pull_request:
    branches:
      - main
      - release-4.22

permissions:
  contents: read

jobs:
  cpo-container-sync:
    name: CPO Container Sync
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: make cpo-container-sync
