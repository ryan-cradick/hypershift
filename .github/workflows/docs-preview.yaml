name: Docs Preview

on:
  pull_request_target:
    branches:
      - main
      - release-4.22
    paths:
      - 'docs/**'

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: Build Docs
    runs-on: arc-runner-set
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
          pip-install: '-r docs/requirements.txt'
        env:
          PIP_CACHE_DIR: ${{ runner.temp }}/.pip-cache
      - name: Build documentation
        run: mkdocs build --strict
        working-directory: docs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: docs/site

  deploy:
    name: Deploy Preview
    needs: build
    runs-on: arc-runner-set
    timeout-minutes: 5
    continue-on-error: true
    environment:
      name: docs-preview
      url: https://pr-${{ github.event.pull_request.number }}.hypershift.pages.dev
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-site
          path: site
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
      - name: Deploy to Cloudflare Pages
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=hypershift --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true
