name: Sync Community Fork

on:
  push:
    branches: [main]

jobs:
  sync-community-fork:
    name: Sync Community Fork
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git remote add community https://x-access-token:${{ secrets.COMMUNITY_FORK_TOKEN }}@github.com/hypershift-community/hypershift.git
          git push community main
